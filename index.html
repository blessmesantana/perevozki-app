    <title>Передачкин</title>
    <script>
        (() => {
            try {
                const theme = localStorage.getItem('appTheme');
                const buttonPalette = localStorage.getItem('appButtonPalette');
                const themeColorMeta = document.querySelector('meta[name="theme-color"]');
                const rootStyle = document.documentElement.style;

                const normalizeHex = (value, fallback) => (
                    /^#[0-9a-f]{6}$/i.test(value || '')
                        ? value.toUpperCase()
                        : fallback
                );
                const parseHex = (hex) => ({
                    r: Number.parseInt(hex.slice(1, 3), 16),
                    g: Number.parseInt(hex.slice(3, 5), 16),
                    b: Number.parseInt(hex.slice(5, 7), 16),
                });
                const rgbToHex = (r, g, b) => {
                    const clamp = (channel) => Math.max(0, Math.min(255, Math.round(channel)));
                    return `#${
                        [clamp(r), clamp(g), clamp(b)]
                            .map((channel) => channel.toString(16).padStart(2, '0'))
                            .join('')
                    }`.toUpperCase();
                };
                const rgbaString = (hex, alpha) => {
                    const { r, g, b } = parseHex(hex);
                    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
                };
                const mixHexColors = (baseHex, targetHex, amount) => {
                    const base = parseHex(baseHex);
                    const target = parseHex(targetHex);
                    const ratio = Math.max(0, Math.min(1, amount));
                    return rgbToHex(
                        base.r + ((target.r - base.r) * ratio),
                        base.g + ((target.g - base.g) * ratio),
                        base.b + ((target.b - base.b) * ratio),
                    );
                };
                const getRelativeLuminance = (hex) => {
                    const { r, g, b } = parseHex(hex);
                    const channels = [r, g, b].map((channel) => {
                        const normalized = channel / 255;
                        return normalized <= 0.03928
                            ? normalized / 12.92
                            : ((normalized + 0.055) / 1.055) ** 2.4;
                    });

                    return (0.2126 * channels[0]) + (0.7152 * channels[1]) + (0.0722 * channels[2]);
                };
                const setThemeVariables = (variableMap) => {
                    Object.entries(variableMap).forEach(([name, value]) => {
                        rootStyle.setProperty(name, value);
                    });
                };

                if (
                    theme === 'light' ||
                    theme === 'dark' ||
                    theme === 'blue' ||
                    theme === 'custom'
                ) {
                    document.documentElement.dataset.theme = theme;
                }

                if (theme === 'custom') {
                    const customThemeRaw = localStorage.getItem('appCustomTheme');
                    const customTheme = customThemeRaw ? JSON.parse(customThemeRaw) : null;
                    const backgroundHex = normalizeHex(customTheme?.background?.hex, '#3949AB');
                    const buttonHex = normalizeHex(customTheme?.buttons?.hex, '#EA1E63');
                    const buttonHoverHex = mixHexColors(buttonHex, '#000000', 0.16);
                    const isLightBackground = getRelativeLuminance(backgroundHex) > 0.5;
                    const buttonText = getRelativeLuminance(buttonHex) > 0.58 ? '#1F242B' : '#FFFFFF';
                    const surfaceColor = isLightBackground
                        ? rgbaString('#FFFFFF', 0.58)
                        : rgbaString('#FFFFFF', 0.08);
                    const surfaceSoft = isLightBackground
                        ? rgbaString('#FFFFFF', 0.74)
                        : rgbaString('#FFFFFF', 0.1);

                    setThemeVariables({
                        '--color-app-bg': backgroundHex,
                        '--color-screen-bg': backgroundHex,
                        '--color-surface': surfaceColor,
                        '--color-surface-strong': isLightBackground
                            ? mixHexColors(backgroundHex, '#FFFFFF', 0.2)
                            : mixHexColors(backgroundHex, '#FFFFFF', 0.07),
                        '--color-surface-soft': surfaceSoft,
                        '--color-input-bg': isLightBackground ? '#FFFFFF' : mixHexColors(backgroundHex, '#000000', 0.22),
                        '--color-input-text': isLightBackground ? '#1F242B' : '#F5F5F5',
                        '--color-input-muted': isLightBackground ? '#7F8793' : '#B8B8C2',
                        '--color-manual-entry-bg': 'transparent',
                        '--color-manual-entry-text': isLightBackground ? '#1F242B' : '#FFFFFF',
                        '--color-manual-entry-border': rgbaString(buttonHex, 0.42),
                        '--color-data-entry-textarea-bg': isLightBackground ? rgbaString('#FFFFFF', 0.84) : surfaceSoft,
                        '--color-data-entry-textarea-text': isLightBackground ? '#1F242B' : '#F5F5F5',
                        '--color-button-group-bg': isLightBackground
                            ? mixHexColors(backgroundHex, '#FFFFFF', 0.38)
                            : mixHexColors(backgroundHex, '#FFFFFF', 0.24),
                        '--color-qr-surface': isLightBackground
                            ? rgbaString('#FFFFFF', 0.9)
                            : mixHexColors(backgroundHex, '#000000', 0.12),
                        '--color-modal-surface': isLightBackground
                            ? mixHexColors(backgroundHex, '#FFFFFF', 0.18)
                            : mixHexColors(backgroundHex, '#000000', 0.1),
                        '--color-sidebar-surface': isLightBackground
                            ? rgbaString('#FFFFFF', 0.88)
                            : rgbaString(backgroundHex, 0.92),
                        '--color-sidebar-hover': isLightBackground
                            ? rgbaString('#1F242B', 0.06)
                            : rgbaString('#FFFFFF', 0.06),
                        '--color-qr-shell-bg': rgbaString(buttonHex, 0.08),
                        '--shadow-soft': isLightBackground
                            ? '0 10px 28px rgba(31, 36, 43, 0.12)'
                            : '0 4px 24px rgba(0, 0, 0, 0.18)',
                        '--shadow-card': isLightBackground
                            ? '0 14px 30px rgba(31, 36, 43, 0.08)'
                            : `0 12px 28px ${rgbaString(backgroundHex, 0.34)}`,
                        '--shadow-nav': isLightBackground
                            ? 'inset 1px 1px 3px rgba(255, 255, 255, 0.75), inset -1px -1px 4px rgba(138, 145, 157, 0.18), 0 12px 28px rgba(31, 36, 43, 0.12)'
                            : 'inset 1px 1px 4px rgba(255, 255, 255, 0.08), inset -1px -1px 6px rgba(0, 0, 0, 0.22), 0 10px 30px rgba(0, 0, 0, 0.24)',
                        '--shadow-button': isLightBackground
                            ? '0 10px 24px rgba(31, 36, 43, 0.08)'
                            : '0 10px 24px rgba(47, 67, 196, 0.2)',
                        '--shadow-button-accent': `0 0 10px ${rgbaString(buttonHex, 0.28)}, 0 0 24px ${rgbaString(buttonHex, 0.16)}`,
                        '--shadow-button-accent-hover': `0 0 12px ${rgbaString(buttonHex, 0.34)}, 0 0 28px ${rgbaString(buttonHex, 0.18)}`,
                        '--shadow-qr-container': isLightBackground
                            ? '0 20px 34px rgba(31, 36, 43, 0.08)'
                            : `0 18px 34px ${rgbaString(buttonHex, 0.12)}, 0 0 24px ${rgbaString(buttonHex, 0.08)}`,
                        '--color-frame': buttonHex,
                        '--color-frame-shadow': `0 0 16px ${rgbaString(buttonHex, 0.24)}`,
                        '--color-primary': buttonHex,
                        '--color-primary-hover': buttonHoverHex,
                        '--color-primary-text': buttonText,
                        '--color-button-accent-border': rgbaString(buttonHex, 0.42),
                        '--color-scan-button-bg': buttonHex,
                        '--color-scan-button-hover-bg': buttonHoverHex,
                        '--color-scan-button-text': buttonText,
                        '--shadow-scan-button': isLightBackground
                            ? `0 10px 24px ${rgbaString(buttonHex, 0.18)}`
                            : `0 10px 24px ${rgbaString(buttonHex, 0.22)}`,
                        '--nav-bg': isLightBackground ? rgbaString('#FFFFFF', 0.62) : rgbaString(backgroundHex, 0.78),
                        '--nav-hover-bg': isLightBackground ? rgbaString('#1F242B', 0.04) : rgbaString('#FFFFFF', 0.08),
                        '--nav-active-bg': 'transparent',
                        '--nav-active-shadow': 'none',
                        '--nav-active-content-color': buttonText,
                        '--nav-glider-opacity': '1',
                        '--nav-glider-bg': `linear-gradient(135deg, ${mixHexColors(buttonHex, '#FFFFFF', 0.34)}, ${buttonHex})`,
                        '--nav-glider-shadow': `0 0 18px ${rgbaString(buttonHex, 0.36)}, 0 0 10px ${rgbaString(mixHexColors(buttonHex, '#FFFFFF', 0.42), 0.24)} inset`,
                    });

                    document.documentElement.style.backgroundColor = backgroundHex;

                    if (themeColorMeta) {
                        themeColorMeta.setAttribute('content', backgroundHex);
                    }
                } else if (theme === 'light' || theme === 'dark' || theme === 'blue') {
                    if (themeColorMeta) {
                        themeColorMeta.setAttribute(
                            'content',
                            theme === 'dark'
                                ? '#141414'
                                : theme === 'light'
                                  ? '#e8e8e8'
                                : '#3949AB',
                        );
                    }
                }

                if (
                    buttonPalette === 'pink'
                    || buttonPalette === 'platinum'
                    || buttonPalette === 'gold'
                    || buttonPalette === 'white'
                ) {
                    document.documentElement.dataset.buttonPalette = buttonPalette;
                }
            } catch (error) {}
        })();
    </script>

            display: none;

            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        #cameraSelect option {
            background: var(--color-screen-bg);
            color: var(--color-text-primary);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
